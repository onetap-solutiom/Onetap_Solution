services:
  # ─────────────────────────────────────────────
  # BACKEND — Flask / Gunicorn
  # ─────────────────────────────────────────────
  - type: web
    name: onetap-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a strong random value
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DB_HOST
        sync: false                  # You will fill these in Render dashboard
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: FRONTEND_URL
        sync: false                  # Set to your Render static site URL after deploy

  # ─────────────────────────────────────────────
  # FRONTEND — React / Vite (Static Site)
  # ─────────────────────────────────────────────
  - type: web
    name: onetap-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false                  # Set to your onetap-backend Render URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html     # Enables React Router client-side routing
